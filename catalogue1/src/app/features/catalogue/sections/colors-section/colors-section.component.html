<section class="section" id="color">
  <div class="section-head">
    <span class="section-num">02</span>
    <h2 class="section-title">Color</h2>
  </div>
  <div class="swatch-grid">
    <div class="swatch" style="background:var(--bg)">
      <span class="swatch-label">bg</span>
    </div>
    <div class="swatch" style="background:var(--surface)">
      <span class="swatch-label">surface</span>
    </div>
    <div class="swatch" style="background:var(--surface-2)">
      <span class="swatch-label">surface-2</span>
    </div>
    <div class="swatch" style="background:var(--text)">
      <span class="swatch-label" style="color:var(--bg)">text</span>
    </div>
    <div class="swatch" style="background:var(--text-muted)">
      <span class="swatch-label" style="color:var(--bg)">muted</span>
    </div>
    <div class="swatch" style="background:var(--text-dim)">
      <span class="swatch-label" style="color:var(--bg)">dim</span>
    </div>
  </div>
  <div class="semantic-grid">
    <div class="swatch" style="background:var(--success)">
      <span class="swatch-label">success</span>
    </div>
    <div class="swatch" style="background:var(--warning)">
      <span class="swatch-label">warning</span>
    </div>
    <div class="swatch" style="background:var(--danger)">
      <span class="swatch-label">danger</span>
    </div>
    <div class="swatch" style="background:var(--info)">
      <span class="swatch-label">info</span>
    </div>
  </div>
</section>
