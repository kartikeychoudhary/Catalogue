<section class="section">
  <div class="section-head">
    <span class="section-num">06</span>
    <h2 class="section-title">Cards</h2>
  </div>

  <div class="card-grid">
    <app-card>
      <h4>Basic Card</h4>
      <p>A simple card with text content and a neutral surface background.</p>
    </app-card>
    <app-card>
      <h4>Rich Card</h4>
      <p>Cards support any nested content — text, images, buttons, forms.</p>
      <app-button variant="primary" size="sm">Action</app-button>
    </app-card>
  </div>

  <div class="card-grid">
    <app-card-feature>
      <h4>Feature Card</h4>
      <p>Highlighted feature with icon, title, and extended description.</p>
    </app-card-feature>
    <app-card-media title="Media Card" description="Image-first layout with eyebrow, title, description and metadata." eyebrow="Case Study" metaLabel="Published" metaValue="2026"></app-card-media>
  </div>

  <div class="card-grid">
    <app-card-pricing
      price="CHF 29"
      period="/ month"
      description="Essential plan for individuals and small teams."
      [features]="['Up to 5 projects', 'Basic analytics', 'Email support']"
      ctaLabel="Get started"></app-card-pricing>
    <app-card-pricing
      price="CHF 99"
      period="/ month"
      description="Professional plan with unlimited projects and priority support."
      [features]="['Unlimited projects', 'Advanced analytics', 'Priority support', 'Custom domain']"
      ctaLabel="Upgrade"></app-card-pricing>
  </div>

  <div class="card-grid">
    <app-card-profile
      avatarInitials="HW"
      name="Hans Wilsdorf"
      role="Master Watchmaker"
      bio="Founder of Rolex. Precision, legibility, and permanence."
      metaLabel="Location"
      metaValue="Geneva"></app-card-profile>
    <app-card-stat eyebrow="Revenue" value="CHF 2.4M" delta="+12.5%" deltaDirection="up" caption="vs previous year"></app-card-stat>
  </div>
</section>
