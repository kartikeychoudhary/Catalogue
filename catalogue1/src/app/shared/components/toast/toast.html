<div class="toast" [class.-success]="variant === 'success'" role="status">
  <span class="toast-dot" *ngIf="showDot" aria-hidden="true"></span>
  <span class="toast-message">{{ message }}</span>
  <button class="toast-action" *ngIf="actionLabel" (click)="actionClick.emit()">{{ actionLabel }}</button>
  <button class="toast-dismiss" (click)="dismiss.emit()" aria-label="Dismiss">&times;</button>
</div>
