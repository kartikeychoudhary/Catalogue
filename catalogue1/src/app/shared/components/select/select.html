<div class="field">
  <label *ngIf="label">{{ label }}</label>
  <select
    class="select"
    [multiple]="multiple"
    [attr.size]="size !== undefined ? size : null"
    [disabled]="disabled || null"
    [attr.aria-label]="label || null"
  >
    <option *ngFor="let opt of options" [value]="opt.value" [selected]="opt.value === value">{{ opt.label }}</option>
  </select>
</div>
