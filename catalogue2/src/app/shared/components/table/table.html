<div class="tbl-wrap">
  <table class="tbl">
    <thead>
      <tr>
        <th *ngFor="let col of columns" (click)="onSort(col)">
          {{ col.label }}
        </th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of rows">
        <td *ngFor="let col of columns" [class.num]="isNum(row[col.key])">
          {{ row[col.key] }}
        </td>
      </tr>
    </tbody>
  </table>
</div>
